<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Frame Extractor Wowzers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body { 
            display: flex; 
            flex-direction: column;
            margin: 0;
            background-color: #111111;
            padding-top: 30px;
            min-height: 100dvh; 
            overflow-x: hidden;
            overflow-y: hidden;
        }

        pre { background: #eee; padding: 10px; }
        header {
            background-color: rgb(116, 116, 116);
            position: fixed;    
            top: 0;             
            left: 0;            
            width: 100%;        
            padding: 5px 20px; 
            display: flex;      
            align-items: center;
            z-index: 1000;      
        }
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            flex: 1; 
        }

        #btn {
            align-self: flex-start;
            padding: 5px 15px;
            height: 9vh;
            max-height: 40px;
            font-size: 20px;
        }
        #pau {
            height: 30px;
            width: 300px;
        }
        #btnload {
            position: relative;
            left: 20px;
            width: 60px;
            height: 30px;
        }
        
        #subject {
            width: 50vw;
            height: 40vh;
        }
        #resultado {
            width: 100%;
            height: 40vh; 
            max-width: auto; 
            background-color: #1e1e1e; 
            color: #ffffff; 
            font-family: monospace; 
            padding: 10px; 
            resize: none; 
            overflow-y: scroll;
        }
        .buto {
            background-color: #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            flex: 1; 
            
        }
        .info {
            position: relative;
            background-color: #444;
            width: 50vw;
            height: 40vh;
            min-height: 50%;
            max-height: 50%;
            display: flex;
            align-items: center;
            color: #fff;
        }
        .topthings {
            display: flex;       
            align-items: center; 
            gap: 15px;           
            font-size: 40px;
            height: auto;
        }
        .bts{
            display: grid;
            place-items: center;
        }

        #exfrom, #exto {
            position: relative;
            width: 100px;
            top: 5px;
            height: 4vh;
            font-size: 25px;
        }
        .extractbuttons {
            display: flex;       
            align-items: center; 
            gap: 15px;          
            color: #eee;
            font-size: 30px;
            height: 30px;
        }


        #anitta {
            height: 25vh;
            position: absolute; 
            right: 5%;           
        }
        #insrange, #insbutton{
            width: 60px;
            height: 5dvh;
            max-height: 30px;
            top: 4px;
            position: relative;
        }

        #curtime {
            position: absolute;
            top:50%;
            left: 10%;
        }

    </style>
</head>
<body>

    <header>
        <select name="Video" id="pau"></select>
        <button id="btnload">Load</button>
    </header>

    <main class="main-content">
        <div class="topthings">
            <video autoplay="true" src="" id="subject" controls></video>
            <div class="info"> 
                <p id="curtime">0</p>
                <img src="anitta.jpg" id="anitta">
            </div>
        </div>
        <div class="buto">
            <div class="extractbuttons">
                <button id="btn">Extract</button>
                <p>From</p>
                    <div class="bts">
                        <input type="From" id="exfrom">
                        <!-- <input type="button" name="insert" id="insbutton"> -->
                        <button id="insbutton">Insert</button>
                    </div>
                <p>To</p>
                    <div class="bts">
                        <input type="To" id="exto">
                        <input type="number" name="range" id="insrange">
                    </div>
                <p id="outtext">Output: ./None</p>
            </div>
            <div class="extractbuttons2">
            </div>
            <!-- <pre id="resultado">Waiting...</pre> -->
            <textarea 
            id="resultado" 
            readonly 
            rows="100">
            </textarea>
        </div>
    </main>

    <script src="renderer.js"></script>

    <script>
            const video = document.querySelector('video');

            video.addEventListener('timeupdate', (event) => {
                document.getElementById("curtime").innerText = video.currentTime.toFixed(0);
            });
            
            document.getElementById("insbutton").addEventListener('click', (event) => {
                document.getElementById("exfrom").value = video.currentTime.toFixed(0);
                document.getElementById("exto").value = parseInt(video.currentTime.toFixed(0)) + parseInt(document.getElementById("insrange").value);
                
            })
            const numberInput = document.getElementById('insrange'); // Or your input ID

    numberInput.addEventListener('wheel', function(event) {
        event.preventDefault();
        let currentValue = parseInt(this.value) || 0;
        let step = parseInt(this.step) || 1;
        if (event.deltaY < 0) {
            this.value = currentValue + step; // Scroll Up = Increase
        } else {
            this.value = currentValue - step; // Scroll Down = Decrease
        }
        this.dispatchEvent(new Event('input'));
    }, { passive: false }); 
    </script>
</body>
</html>
